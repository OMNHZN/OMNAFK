name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Test
        working-directory: src-tauri
        run: cargo test --locked

      - name: Build custom OMNAFK setup
        shell: pwsh
        run: ./scripts/build-custom-installer.ps1 -KeepBuildCache

      - name: Checksum installer
        shell: pwsh
        run: |
          $hash = Get-FileHash dist/OMNAFK-Setup.exe -Algorithm SHA256
          "$($hash.Hash)  OMNAFK-Setup.exe" | Set-Content -Encoding ascii dist/OMNAFK-Setup.exe.sha256

      - name: Prepare release notes
        shell: pwsh
        run: |
          $path = "docs/releases/${{ github.ref_name }}.md"
          if (Test-Path $path) {
            Copy-Item $path release-notes.md
          } else {
            "Stable OMNAFK build ${{ github.ref_name }}." | Set-Content release-notes.md
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: OMNAFK ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/OMNAFK-Setup.exe
            dist/OMNAFK-Setup.exe.sha256
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Keep the two newest stable releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GITHUB_TOKEN"
            "X-GitHub-Api-Version" = "2026-03-10"
          }
          $repo = "${{ github.repository }}"
          $releases = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/$repo/releases?per_page=100"
          $stale = $releases |
            Where-Object { -not $_.draft -and -not $_.prerelease } |
            Sort-Object published_at -Descending |
            Select-Object -Skip 2

          foreach ($release in $stale) {
            Invoke-RestMethod `
              -Method Delete `
              -Headers $headers `
              -Uri "https://api.github.com/repos/$repo/releases/$($release.id)"
            try {
              Invoke-RestMethod `
                -Method Delete `
                -Headers $headers `
                -Uri "https://api.github.com/repos/$repo/git/refs/tags/$($release.tag_name)"
            } catch {
              if ($_.Exception.Response.StatusCode -ne 404) { throw }
            }
          }
