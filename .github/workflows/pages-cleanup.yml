name: Pages Cleanup

on:
  workflow_run:
    workflows:
      - pages build and deployment
    types:
      - completed
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    name: Remove old Pages deployments
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Keep latest Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner,
                repo,
                environment: "github-pages",
                per_page: 100
              }
            );

            const sorted = deployments.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            const oldDeployments = sorted.slice(1);

            for (const deployment of oldDeployments) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  state: "inactive",
                  auto_inactive: false
                });
              } catch (error) {
                core.info(`Could not mark deployment ${deployment.id} inactive: ${error.message}`);
              }

              try {
                await github.rest.repos.deleteDeployment({
                  owner,
                  repo,
                  deployment_id: deployment.id
                });
                core.info(`Deleted old Pages deployment ${deployment.id}`);
              } catch (error) {
                core.warning(`Could not delete deployment ${deployment.id}: ${error.message}`);
              }
            }

            core.info(`Kept 1 deployment, checked ${oldDeployments.length} old deployment(s).`);
